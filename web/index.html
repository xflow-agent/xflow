<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xflow - AI 编程助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">xflow</span>
                </div>
                <span class="version">v0.1.0</span>
            </div>
            
            <div class="sidebar-content">
                <button class="new-chat-btn" id="newChatBtn">
                    <span class="icon">+</span>
                    <span>新对话</span>
                </button>
                
                <div class="history-section">
                    <div class="section-header">历史对话</div>
                    <div class="history-list" id="historyList">
                        <!-- 动态填充 -->
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot disconnected"></span>
                    <span>未连接</span>
                </div>
                <div class="model-info" id="modelInfo">
                    <span class="model-name">qwen2.5:7b</span>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">⚡</div>
                    <h1>xflow 编程助手</h1>
                    <p>我可以帮你编写代码、分析项目、修复错误</p>
                    <div class="quick-actions">
                        <button class="quick-action" data-prompt="分析一下这个项目的结构">
                            <span class="icon">📊</span>
                            <span>分析项目</span>
                        </button>
                        <button class="quick-action" data-prompt="帮我检查代码中的问题">
                            <span class="icon">🔍</span>
                            <span>检查代码</span>
                        </button>
                        <button class="quick-action" data-prompt="解释一下这个功能是如何实现的">
                            <span class="icon">💡</span>
                            <span>解释代码</span>
                        </button>
                    </div>
                </div>
                
                <div class="messages" id="messages">
                    <!-- 消息动态填充 -->
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="输入消息... (Shift+Enter 换行, Enter 发送)"
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">
                    <span id="charCount">0</span> 字符
                </div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
